<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Todo List</title>

<style>

:root{
    --bg:#f5f5f5;
    --card:white;
    --text:#222;
    --border:#ccc;
}

.dark{
    --bg:#181818;
    --card:#242424;
    --text:white;
    --border:#555;
}

body{
    font-family:Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    max-width:800px;
    margin:30px auto;
    padding:20px;
    transition:.3s;
}

.container{
    background:var(--card);
    padding:25px;
    border-radius:15px;
    border:1px solid var(--border);
}

input,button,select{
    padding:10px;
    margin:5px;
    border-radius:6px;
    border:1px solid var(--border);
}

button{
    cursor:pointer;
}

.task{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    margin:8px 0;
    border:1px solid var(--border);
    border-radius:8px;
}

.task:hover{
    transform:scale(1.02);
}

.task-info{
    cursor:pointer;
    flex:1;
}

.small{
    font-size:12px;
    opacity:.7;
}

.delete{
    background:#ff6666;
    color:white;
}

.edit{
    background:#4da6ff;
    color:white;
}

ul{
    list-style:none;
    padding:0;
}

.section{
    margin-top:25px;
}

.counter{
    font-size:14px;
}

</style>
</head>


<body>

<div class="container">

<h1>✔ My Todo List</h1>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<br>

<input id="taskInput" placeholder="Task name">

<input id="dateInput" type="date">

<button onclick="addTask()">Add Task</button>


<br>

<input 
id="search"
placeholder="Search..."
oninput="displayTasks()">


<div class="section">

<h2>
Todo List 
<span class="counter" id="todoCount"></span>
</h2>

<ul id="todoList"></ul>

</div>



<div class="section">

<h2>
Done List
<span class="counter" id="doneCount"></span>
</h2>

<ul id="doneList"></ul>

</div>


<button onclick="clearDone()">Clear Done</button>

<button onclick="exportData()">Export</button>

<input type="file" id="fileInput" onchange="importData()">


</div>



<script>


let todo = JSON.parse(localStorage.getItem("todo")) || [];
let done = JSON.parse(localStorage.getItem("done")) || [];


let dark =
localStorage.getItem("dark") === "true";


if(dark){
    document.body.classList.add("dark");
}



function save(){

localStorage.setItem(
"todo",
JSON.stringify(todo)
);

localStorage.setItem(
"done",
JSON.stringify(done)
);

}



function addTask(){

let text =
document.getElementById("taskInput").value.trim();

let date =
document.getElementById("dateInput").value;


if(text==="") return;


todo.push({
name:text,
date:date
});


save();

displayTasks();


document.getElementById("taskInput").value="";
document.getElementById("dateInput").value="";

}




function displayTasks(){

let search =
document.getElementById("search").value.toLowerCase();


let todoHTML="";
let doneHTML="";


todo.forEach((task,index)=>{


if(task.name.toLowerCase().includes(search)){

todoHTML += createTask(task,index,false);

}

});



done.forEach((task,index)=>{


if(task.name.toLowerCase().includes(search)){

doneHTML += createTask(task,index,true);

}

});


document.getElementById("todoList").innerHTML=todoHTML;

document.getElementById("doneList").innerHTML=doneHTML;


document.getElementById("todoCount").innerHTML=
"("+todo.length+")";


document.getElementById("doneCount").innerHTML=
"("+done.length+")";


}



function createTask(task,index,isDone){

return `

<li class="task">

<div class="task-info" onclick="moveTask(${index},${isDone})">

${isDone ? "✔" : "☐"} 
${task.name}

<br>

<span class="small">
${task.date ? "Due: "+task.date:""}
</span>

</div>


<button class="edit" onclick="editTask(${index},${isDone})">
✏️
</button>


<button class="delete" onclick="deleteTask(${index},${isDone})">
🗑️
</button>


</li>

`;

}




function moveTask(index,isDone){

if(isDone){

todo.push(done[index]);
done.splice(index,1);

}
else{

done.push(todo[index]);
todo.splice(index,1);

}

save();
displayTasks();

}




function deleteTask(index,isDone){

if(isDone){

done.splice(index,1);

}
else{

todo.splice(index,1);

}

save();
displayTasks();

}





function editTask(index,isDone){

let list=isDone?done:todo;


let newName =
prompt(
"Edit task:",
list[index].name
);


if(newName){

list[index].name=newName;

save();
displayTasks();

}

}




function clearDone(){

done=[];

save();
displayTasks();

}





function toggleDark(){

document.body.classList.toggle("dark");


localStorage.setItem(
"dark",
document.body.classList.contains("dark")
);

}





function exportData(){

let data={
todo:todo,
done:done
};


let file =
new Blob(
[JSON.stringify(data)],
{type:"application/json"}
);


let link=document.createElement("a");

link.href=
URL.createObjectURL(file);

link.download="todo_backup.json";

link.click();

}




function importData(){

let file=
document.getElementById("fileInput").files[0];


let reader=new FileReader();


reader.onload=function(e){

let data=
JSON.parse(e.target.result);


todo=data.todo || [];
done=data.done || [];


save();
displayTasks();

};


reader.readAsText(file);

}



displayTasks();


</script>


</body>
</html>
